name: baseball_scoresheet
description: Application de score de baseball pour arbitres et marqueurs amateurs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Base de données locale
  sqflite: ^2.3.2
  path: ^1.9.0

  # Gestion d'état
  provider: ^6.1.2

  # Publicité Google
  google_mobile_ads: ^5.1.0

  # Formatage de dates
  intl: ^0.19.0

  # Calendrier
  table_calendar: ^3.1.2

  # Préférences locales
  shared_preferences: ^2.2.3

  # Génération d'IDs uniques
  uuid: ^4.4.0

  # Icônes
  cupertino_icons: ^1.0.8

  # Import / export Excel
  excel: ^4.0.6
  file_picker: ^8.1.3
  share_plus: ^10.0.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
