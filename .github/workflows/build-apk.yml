name: Build APK Android

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:   # permet de déclencher manuellement depuis GitHub

jobs:
  build:
    name: Compiler l'APK de test
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installer Java 17 (requis par le SDK Android)
      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Installer Flutter stable
      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # 4. Vérifier l'installation
      - name: Vérification Flutter
        run: flutter doctor -v

      # 5. Télécharger les dépendances Dart/Flutter
      - name: flutter pub get
        run: flutter pub get

      # 6. Compiler l'APK debug (prêt à installer sans signature)
      - name: Compiler APK debug
        run: flutter build apk --debug --no-tree-shake-icons
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 7. Renommer l'APK avec la date pour s'y retrouver
      - name: Renommer l'APK
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/BaseballScore-debug-${DATE}.apk

      # 8. Uploader l'APK comme artefact téléchargeable
      - name: Uploader l'APK
        uses: actions/upload-artifact@v4
        with:
          name: BaseballScore-APK-debug
          path: build/app/outputs/flutter-apk/BaseballScore-debug-*.apk
          retention-days: 30   # gardé 30 jours

      # 9. Afficher un résumé dans l'interface GitHub
      - name: Résumé de la compilation
        run: |
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-debug.apk | cut -f1)
          echo "## APK compilé avec succès" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Taille:** ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Comment installer sur votre tablette Android:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Télécharger l'APK depuis les artefacts ci-dessous" >> $GITHUB_STEP_SUMMARY
          echo "2. Sur la tablette: Paramètres → Sécurité → Activer **Sources inconnues**" >> $GITHUB_STEP_SUMMARY
          echo "3. Transférer l'APK sur la tablette (USB, Google Drive, email...)" >> $GITHUB_STEP_SUMMARY
          echo "4. Ouvrir le fichier APK sur la tablette pour installer" >> $GITHUB_STEP_SUMMARY
